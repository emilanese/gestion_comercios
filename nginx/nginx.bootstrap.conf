# =============================================================================
# nginx.bootstrap.conf — Configuración temporal SOLO para Let's Encrypt
#
# Este archivo se usa ÚNICAMENTE durante el primer deploy para que Certbot
# pueda validar el dominio por webroot challenge ANTES de que existan los
# certificados SSL (sin este archivo, Nginx fallaría al intentar cargar
# los .pem que aún no existen).
#
# Una vez emitidos los certificados, este archivo ya no se usa.
# El stack de producción usa nginx/nginx.conf (con SSL completo).
# =============================================================================

server {
    listen 80 default_server;
    server_name _;

    # Ruta de validación de Let's Encrypt (webroot challenge)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
    }

    # Todo lo demás: responder 200 con mensaje de estado
    # (No redirigir a HTTPS — los certs aún no existen en este punto)
    location / {
        return 200 'AVANTI — Bootstrap SSL setup in progress. Please wait...';
        add_header Content-Type text/plain;
    }
}
