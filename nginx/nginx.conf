# ─────────────────────────────────────────────────────────────────────────────
# AVANTI — Configuración Nginx
#
# Terminación TLS: Nginx maneja los certificados Let's Encrypt.
# El backend Go recibe HTTP plano en la red interna de Docker.
#
# Subdominios:
#   avanti-retail.cloud         → landing (HTML estático)
#   hub.avanti-retail.cloud     → web-app (Next.js — HUB)
#   pos.avanti-retail.cloud     → web-app (Next.js — POS Web)
#   api.avanti-retail.cloud     → backend-go:8080 (HTTP + WebSocket upgrade)
# ─────────────────────────────────────────────────────────────────────────────

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_vary          on;
    gzip_types         text/plain text/css application/json application/javascript
                       text/xml application/xml text/javascript;

    # ── Headers de seguridad globales ────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy       "strict-origin" always;

    # ── Map para WebSocket upgrade ────────────────────────────────────────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # REDIRECT HTTP → HTTPS (todos los subdominios)
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name avanti-retail.cloud hub.avanti-retail.cloud pos.avanti-retail.cloud api.avanti-retail.cloud;

        # Ruta de validación de Certbot (Let's Encrypt webroot challenge)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Todo lo demás → HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # avanti.com → Landing Page
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name avanti-retail.cloud www.avanti-retail.cloud;

        ssl_certificate     /etc/letsencrypt/live/avanti-retail.cloud/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/avanti-retail.cloud/privkey.pem;
        include             /etc/nginx/conf.d/ssl-params.conf;

        location / {
            proxy_pass         http://landing:80;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # hub.avanti-retail.cloud → AVANTI HUB (Next.js — ADMIN/ENCARGADO)
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name hub.avanti-retail.cloud;

        ssl_certificate     /etc/letsencrypt/live/avanti-retail.cloud/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/avanti-retail.cloud/privkey.pem;
        include             /etc/nginx/conf.d/ssl-params.conf;

        # Cache de assets Next.js
        location /_next/static/ {
            proxy_pass       http://web-app:3000;
            proxy_cache_valid 200 1y;
            add_header       Cache-Control "public, max-age=31536000, immutable";
        }

        location / {
            proxy_pass         http://web-app:3000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # Inyectar subdominio para que Next.js sepa si es HUB o POS
            proxy_set_header   X-Avanti-Module "HUB";
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # pos.avanti-retail.cloud → AVANTI POS Web (Next.js — CAJERO en navegador)
    # Mismo contenedor que hub.avanti-retail.cloud (Opción A).
    # El enrolamiento QR graba el rol CAJERO en localStorage del browser.
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name pos.avanti-retail.cloud;

        ssl_certificate     /etc/letsencrypt/live/avanti-retail.cloud/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/avanti-retail.cloud/privkey.pem;
        include             /etc/nginx/conf.d/ssl-params.conf;

        # El POS Web siempre arranca pantalla completa (fullscreen 100vh)
        add_header Content-Security-Policy "frame-ancestors 'none'" always;

        location /_next/static/ {
            proxy_pass       http://web-app:3000;
            proxy_cache_valid 200 1y;
            add_header       Cache-Control "public, max-age=31536000, immutable";
        }

        location / {
            proxy_pass         http://web-app:3000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # Inyectar subdominio para que Next.js sepa si es HUB o POS
            proxy_set_header   X-Avanti-Module "POS";
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # api.avanti.com → Gestor Cloud Go (HTTP REST + WebSocket Secure)
    #
    # Flujo WSS:
    #   Browser/App → wss://api.avanti-retail.cloud/ws (TLS termina acá)
    #   → Nginx hace proxy a ws://backend-go:8080/ws (HTTP plano, red interna)
    #   → Go valida el JWT ANTES del upgrade de protocolo
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name api.avanti-retail.cloud;

        ssl_certificate     /etc/letsencrypt/live/avanti-retail.cloud/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/avanti-retail.cloud/privkey.pem;
        include             /etc/nginx/conf.d/ssl-params.conf;

        # Timeouts extendidos para conexiones WebSocket de larga duración
        proxy_read_timeout    86400s;
        proxy_send_timeout    86400s;
        proxy_connect_timeout 10s;

        location / {
            proxy_pass         http://backend-go:8080;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # ── Headers críticos para WebSocket upgrade ──────────────────────
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;

            # Sin buffering para WebSocket (streaming en tiempo real)
            proxy_buffering    off;
            proxy_cache        off;
        }
    }
}
