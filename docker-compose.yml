version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
# AVANTI — Docker Compose (Desarrollo local)
#
# Para producción usar:  docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Arquitectura de red:
#   Internet → Nginx (80/443) → web-app | landing | backend-go
#              (en desarrollo los puertos están directamente expuestos)
#
# Subdominios (producción):
#   avanti-retail.cloud         → landing
#   hub.avanti-retail.cloud     → web-app (HUB — ADMIN/ENCARGADO)
#   pos.avanti-retail.cloud     → web-app (POS — CAJERO)  [mismo contenedor, Next.js rutea]
#   api.avanti-retail.cloud     → backend-go + WebSocket
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Proxy inverso ──────────────────────────────────────────────────────────
  # En desarrollo: sirve en localhost con routing básico HTTP.
  # En producción (override prod): termina TLS, certificados Let's Encrypt.
  nginx:
    image: nginx:1.25-alpine
    container_name: avanti-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_webroot:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - landing
      - web-app
      - backend-go
    networks:
      - avanti-network
    restart: unless-stopped

  # ── Landing Page ───────────────────────────────────────────────────────────
  # Página de marketing: precios de planes, CTA de registro.
  # Nginx sirve HTML estático ultra rápido.
  landing:
    build:
      context: ./apps/landing
      dockerfile: Dockerfile
    container_name: avanti-landing
    networks:
      - avanti-network
    restart: unless-stopped

  # ── AVANTI HUB + POS Web ───────────────────────────────────────────────────
  # Single Page Application (Next.js buildeado en producción).
  # hub.avanti.com → ruta /hub  (ADMIN/ENCARGADO)
  # pos.avanti.com → ruta /pos  (CAJERO — WatermelonDB en IndexedDB del browser)
  web-app:
    build:
      context: ./apps/web-app
      dockerfile: Dockerfile
    container_name: avanti-web
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8080/ws}
    networks:
      - avanti-network
    restart: unless-stopped

  # ── Gestor Cloud (Go) ──────────────────────────────────────────────────────
  # Binario Alpine mínimo. HTTP REST + WebSocket.
  # Go NO gestiona TLS — el cifrado lo termina Nginx en el proxy.
  backend-go:
    build:
      context: ./backend-go
      dockerfile: Dockerfile
    container_name: avanti-backend
    environment:
      DATABASE_URL: "postgres://comercios_user:comercios_pass@postgres:5432/comercios_db?sslmode=disable"
      REDIS_URL: "redis://redis:6379"
      PORT: "8080"
      JWT_SECRET: ${JWT_SECRET:-cambia-esto-en-produccion}
    ports:
      - "8080:8080"    # expuesto en dev; en prod solo accesible desde avanti-network
    depends_on:
      - postgres
      - redis
    networks:
      - avanti-network
    restart: unless-stopped

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  # Almacena: credenciales, dispositivos_autorizados, suscripciones.
  # Puerto 5432 expuesto solo en desarrollo (para DBeaver/pgAdmin local).
  postgres:
    image: postgres:16-alpine
    container_name: avanti-postgres
    environment:
      POSTGRES_USER: comercios_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-comercios_pass}
      POSTGRES_DB: comercios_db
    ports:
      - "5432:5432"    # solo en dev; en prod eliminar con override
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres:/docker-entrypoint-initdb.d
    networks:
      - avanti-network
    restart: unless-stopped

  # ── Redis ──────────────────────────────────────────────────────────────────
  # Contador de versiones por sucursal (OCC/CAS).
  # Datos efímeros — se pueden perder sin impacto en la BD principal.
  redis:
    image: redis:7-alpine
    container_name: avanti-redis
    command: redis-server --appendonly no --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"    # solo en dev
    volumes:
      - redis_data:/data
    networks:
      - avanti-network
    restart: unless-stopped

  # ── Certbot (solo producción — inactivo en dev) ────────────────────────────
  # Obtiene y renueva certificados Let's Encrypt.
  # En dev este servicio existe pero no hace nada dañino.
  certbot:
    image: certbot/certbot:latest
    container_name: avanti-certbot
    volumes:
      - certbot_webroot:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Comando manual para primera emisión:
    # docker compose run --rm certbot certonly --webroot -w /var/www/certbot
    #   -d avanti-retail.cloud -d hub.avanti-retail.cloud -d pos.avanti-retail.cloud -d api.avanti-retail.cloud
    #   --email admin@avanti-retail.cloud --agree-tos --no-eff-email
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"
    networks:
      - avanti-network

# ─── Volúmenes ─────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  certbot_webroot:
  certbot_certs:

# ─── Red interna ───────────────────────────────────────────────────────────────
networks:
  avanti-network:
    driver: bridge
